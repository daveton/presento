version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: presento-backend
    ports:
      - "3301:3301"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ALLOWED_ORIGINS=http://192.168.10.105:3302,http://192.168.10.105:5668,http://localhost:3000,http://localhost:5668
    volumes:
      - /tmp/presento:/tmp/presento
    restart: unless-stopped
    networks:
      - presento-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: presento-frontend
    ports:
      - "3302:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://192.168.10.105:3301
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - presento-network

networks:
  presento-network:
    driver: bridge
